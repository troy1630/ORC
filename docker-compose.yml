services:
  orc-api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: orc-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./agents:/app/agents
      - ./skills:/app/skills
      - ./tools:/app/tools
      - ./runbooks:/app/runbooks
      - ./memory:/app/memory
      - ./knowledge:/app/knowledge
      - ./docs:/app/docs:ro
    depends_on:
      - postgres
      - redis

  orc-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: orc-worker
    env_file:
      - .env
    command: ["python", "-m", "app.worker"]
    volumes:
      - ./agents:/app/agents:ro
      - ./skills:/app/skills:ro
      - ./tools:/app/tools:ro
      - ./runbooks:/app/runbooks:ro
      - ./memory:/app/memory:ro
      - ./knowledge:/app/knowledge:ro
      - ./docs:/app/docs:ro
    depends_on:
      - postgres
      - redis

  orc-tool-runner:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    command: ["python", "-m", "app.worker"]
    volumes:
      - ./agents:/app/agents:ro
      - ./skills:/app/skills:ro
      - ./tools:/app/tools:ro
      - ./runbooks:/app/runbooks:ro
      - ./memory:/app/memory:ro
      - ./knowledge:/app/knowledge:ro
      - ./docs:/app/docs:ro
      - worker_jobs:/app/worker-jobs
    depends_on:
      - postgres
      - redis

  orc-builder:
    build:
      context: .
      dockerfile: builder/Dockerfile
    container_name: orc-builder
    working_dir: /workspace
    volumes:
      - ./builder/workspace:/workspace
      - ./skills:/app/skills
      - ./tools:/app/tools
      - ./runbooks:/app/runbooks
      - ./memory:/app/memory
      - ./docs:/app/docs:ro
    command: ["sleep", "infinity"]

  postgres:
    image: postgres:16
    container_name: orc-postgres
    environment:
      POSTGRES_DB: orc
      POSTGRES_USER: orc
      POSTGRES_PASSWORD: orc
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: orc-redis

volumes:
  postgres_data:
  worker_jobs:
