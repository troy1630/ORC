services:
  orc-api:
    build:
      context: ../backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://orc:orc@postgres:5432/orc}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      TZ: America/Denver
    ports:
      - "8001:8000"
    volumes:
      - ../agents:/app/agents
      - ../skills:/app/skills
      - ../knowledge:/app/knowledge
      - ../docs:/app/docs:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  orc-worker:
    build:
      context: ../backend
    command: ["python", "-m", "app.worker"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://orc:orc@postgres:5432/orc}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      TZ: America/Denver
    volumes:
      - ../agents:/app/agents:ro
      - ../skills:/app/skills:ro
      - ../knowledge:/app/knowledge:ro
      - ../docs:/app/docs:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: orc
      POSTGRES_USER: orc
      POSTGRES_PASSWORD: orc
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orc -d orc"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7

volumes:
  postgres_data:
    external: true
    name: orc-postgres-data
