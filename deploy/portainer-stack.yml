services:
  orc-api:
    build:
      context: ../backend
    environment:
      PORTAINER_BASE_URL: ${PORTAINER_BASE_URL}
      PORTAINER_API_TOKEN: ${PORTAINER_API_TOKEN}
      DATABASE_URL: ${DATABASE_URL:-postgresql://orc:orc@postgres:5432/orc}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    ports:
      - "8000:8000"
    volumes:
      - ../agents:/app/agents:ro
      - ../skills:/app/skills:ro
      - ../docs:/app/docs:ro
    depends_on:
      - postgres
      - redis

  orc-worker:
    build:
      context: ../backend
    command: ["python", "-m", "app.worker"]
    environment:
      PORTAINER_BASE_URL: ${PORTAINER_BASE_URL}
      PORTAINER_API_TOKEN: ${PORTAINER_API_TOKEN}
      DATABASE_URL: ${DATABASE_URL:-postgresql://orc:orc@postgres:5432/orc}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    volumes:
      - ../agents:/app/agents:ro
      - ../skills:/app/skills:ro
      - ../docs:/app/docs:ro
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: orc
      POSTGRES_USER: orc
      POSTGRES_PASSWORD: orc
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

volumes:
  postgres_data:
